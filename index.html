<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Q-Less Dice</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <script src="sketch.js"></script>

    <div id="pageContainer">

    <div id="titleWrapper" style="width:100%;max-width:720px;margin:6px auto;padding:6px;text-align:center;">
      <h1 style="margin:0;font-weight:600;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;">Q-Less Game</h1>
    </div>

    <br/>

    <form id="diceForm">
    <div id="controls" style="width:100%;max-width:720px;margin:12px auto;padding:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <br/>
      <label for="diceInput" style="flex:1 1 320px;min-width:180px;white-space:normal;word-break:break-word;">Enter 12 letters (one per die):</label>
      <br/>
      <input id="diceInput" type="text" maxlength="12" placeholder="e.g. ABCDEFGHIJKL" style="flex:2 1 300px;padding:8px;font-size:16px;" />
      <button id="loadBtn" disabled style="padding:8px 12px;font-size:16px;">Load</button>
      <div id="ctrlMsg" style="width:100%;color:#666;font-size:13px;margin-top:6px;white-space:normal;word-break:break-word;"></div>
      <br/>
      <div class="btn-row">
        <a id="resetCanvasBtn" href="#" class="btn-secondary">Reset</a>
        <a id="checkLink" href="#" class="btn-primary">Check solution</a>
        <a id="dictLink" href="https://chaoaj.github.io/qless-solve/" class="btn-secondary" target="_blank">Dictionary</a>
        <a id="cgiLink" href="#" class="btn-secondary">Original Solver</a>
      </div>

    </div>
    </form>

    <script>
      // validate input to enable Load button only when exactly 12 letters
      const input = document.getElementById('diceInput');
      const loadBtn = document.getElementById('loadBtn');
      const ctrlMsg = document.getElementById('ctrlMsg');

      function validateInput() {
        const val = (input.value || '').replace(/[^a-zA-Z]/g, '');
        input.value = val.toUpperCase();
        if (val.length === 12) {
          loadBtn.disabled = false;
          ctrlMsg.textContent = 'Ready to load 12 letters.';
        } else {
          loadBtn.disabled = true;
          ctrlMsg.textContent = 'Please enter exactly 12 letters.';
        }
      }

      input.addEventListener('input', validateInput);

      loadBtn.addEventListener('click', () => {
        const v = (input.value || '').replace(/[^A-Z]/g, '');
        if (v.length !== 12) return;
        // call global function provided by sketch.js
        if (window.loadDiceFromString) {
          const ok = window.loadDiceFromString(v);
          ctrlMsg.textContent = ok ? 'Loaded letters onto dice.' : 'Failed to load dice.';
        } else {
          ctrlMsg.textContent = 'Game not initialized yet. Try again in a moment.';
        }
      });

      const resetBtn = document.getElementById('resetCanvasBtn');
      if (resetBtn) {
        resetBtn.addEventListener('click', (e) => {
          e.preventDefault();
          // reload the page to get a fresh set of dice
          location.reload();
        });
      }

      // initial message
      ctrlMsg.textContent = 'Please enter exactly 12 letters.';
    </script>

    <script>
      const checkLink = document.getElementById('checkLink');
      const dictLink = document.getElementById('dictLink');
      const checkMsg = document.getElementById('checkMsg');
      function openSolver() {
        // prefer letters from the form input so Check uses exactly what's shown to the user
        let letters = '';
        const input = document.getElementById('diceInput');
        if (input) {
          letters = (input.value || '').replace(/[^A-Z]/gi, '').toUpperCase();
        }
        // fallback to sketch-provided letters if the form isn't populated
        if (!letters || letters.length !== 12) {
          if (typeof window.getDiceLetters === 'function') {
            const g = window.getDiceLetters() || '';
            if (g && g.length === 12) letters = g;
          }
        }

        if (!letters || letters.length !== 12) {
          if (checkMsg) checkMsg.textContent = 'Please ensure all 12 dice have letters before checking.';
          return false;
        }

        // open dictionary with letters query (same param as the CGI)
        const dictBase = 'https://chaoaj.github.io/qless-solve/?letters=';
        const url = dictBase + encodeURIComponent(letters);
        window.open(url, '_blank');
        return true;
      }

      // wire the check link
      if (checkLink) {
        checkLink.addEventListener('click', function(e){
          e.preventDefault();
          openSolver();
        });
      }

      // wire the original CGI solver link as a separate button
      const cgiLink = document.getElementById('cgiLink');
      function openSolverCGI() {
        let letters = '';
        const input = document.getElementById('diceInput');
        if (input) {
          letters = (input.value || '').replace(/[^A-Z]/gi, '').toUpperCase();
        }
        if (!letters || letters.length !== 12) {
          if (typeof window.getDiceLetters === 'function') {
            const g = window.getDiceLetters() || '';
            if (g && g.length === 12) letters = g;
          }
        }
        if (!letters || letters.length !== 12) return false;
        const base = 'https://the-chaos.com/cgi-bin/qless-solver.cgi?letters=';
        const url = base + encodeURIComponent(letters);
        window.open(url, '_blank');
        return true;
      }

      if (cgiLink) {
        cgiLink.addEventListener('click', function(e){
          e.preventDefault();
          openSolverCGI();
        });
      }
    </script>

    <script>
      // Populate the `#diceInput` with the initial rolled dice letters when available.
      (function(){
        const inputEl = () => document.getElementById('diceInput');
        const tryPopulate = () => {
          if (typeof window.getDiceLetters !== 'function') return false;
          const letters = window.getDiceLetters();
          if (!letters || letters.length !== 12) return false;
          const input = inputEl();
          if (!input) return true; // nothing to do
          input.value = letters;
          // run validation to enable the Load button and show message
          if (typeof validateInput === 'function') validateInput();
          if (typeof window.enableDiceControls === 'function') window.enableDiceControls();
          return true;
        };

        // poll briefly until the letters are ready (max ~2s)
        let attempts = 0;
        const maxAttempts = 40;
        const id = setInterval(() => {
          attempts++;
          if (tryPopulate() || attempts >= maxAttempts) clearInterval(id);
        }, 50);

        // also try once on load
        window.addEventListener('load', tryPopulate, {passive:true});
      })();
    </script>

    </div><!-- /#pageContainer -->
  </body>
</html>
